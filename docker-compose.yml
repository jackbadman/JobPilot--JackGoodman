services:
  backend:
    build: ./backend
    container_name: jobpilot-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: jobpilot-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
