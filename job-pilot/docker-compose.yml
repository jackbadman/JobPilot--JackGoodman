services:
  mongo:
    image: mongo:7
    container_name: jobpilot-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: jobpilot-backend
    restart: always
    ports:
    - "5000:5000"
    # remove when auth implemented
    environment:
    - PORT=5000
    - MONGO_URI=mongodb://admin:adminpassword@jobpilot-mongo:27017/jobpilot?authSource=admin
    #env_file:
    #  - ./backend/.env
    depends_on:
      - mongo

volumes:
  mongo_data: