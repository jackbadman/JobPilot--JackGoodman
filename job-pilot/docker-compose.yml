services:
  mongo:
    image: mongo:7
    container_name: jobpilot-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: jobpilot-backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - mongo

volumes:
  mongo_data: